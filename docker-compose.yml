services:

  # ── 1. OLLAMA ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    networks:
      - rag-network

  # ── 2. OLLAMA INIT — scarica modello al primo avvio ────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: rag-ollama-init
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        echo 'Aspetto che Ollama sia pronto...' &&
        sleep 10 &&
        ollama pull ${LLAMA_MODEL:-llama3.1:8b} &&
        echo '✅ Modello pronto!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - rag-network
    restart: "no"

  # ── 3. CHROMADB ────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - rag-network

  # ── 4. BACKEND ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - LLAMA_MODEL=${LLAMA_MODEL:-llama3.1:8b}
      - EMBED_MODEL=${EMBED_MODEL:-all-MiniLM-L6-v2}
      - TOP_K=${TOP_K:-10}
      - TRANSLATE_QUERY=${TRANSLATE_QUERY:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-50}
      - MIN_RETRIEVAL_SCORE=${MIN_RETRIEVAL_SCORE:-0.30}
      - RETRIEVAL_OVERSAMPLE=${RETRIEVAL_OVERSAMPLE:-3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - ollama
    networks:
      - rag-network

  # ── 5. FRONTEND ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rag-network

  # ── 6. HA AGENT ────────────────────────────────────────────────
  ha-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: rag-ha-agent
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - ./agent:/app
      - ${HA_CONFIG_HOST_PATH:-/home/andrea/homeassistant}:/ha_config:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - LLAMA_MODEL=${LLAMA_MODEL:-llama3.1:8b}
      - EMBED_MODEL=${EMBED_MODEL:-all-MiniLM-L6-v2}
      - HA_HOST=${HA_HOST}
      - HA_TOKEN=${HA_TOKEN}
      - HA_CONFIG_PATH=/ha_config
      - TOP_K=${AGENT_TOP_K:-8}
      - ENABLE_WEB_SEARCH=${ENABLE_WEB_SEARCH:-false}
      - ALLOW_HA_ACTIONS=${ALLOW_HA_ACTIONS:-false}
      - ACTION_CONFIRM_TOKEN=${ACTION_CONFIRM_TOKEN:-change-me}
      - MAX_CONFIG_CHARS=${MAX_CONFIG_CHARS:-7000}
      - MAX_EXTRA_CHARS=${MAX_EXTRA_CHARS:-4000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - ollama
    networks:
      - rag-network

volumes:
  ollama_data:
  chroma_data:

networks:
  rag-network:
    driver: bridge
